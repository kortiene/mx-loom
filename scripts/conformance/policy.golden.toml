# Canonical golden-test receiver policy — daemon B. T112 / #20, T114 / #22.
#
# Deny-by-default, enforced OUT-OF-PROCESS on the receiving daemon: mx-loom never
# reads this file; it only observes the daemon's verdict as a normalized envelope
# (status: ok | awaiting_approval | denied, error.code: policy_denied). A
# compromised or hallucinating model can only emit a signed *request*; it cannot
# widen this policy (design §1, §6 L3).
#
# SCHEMA — mx-agent v0.2.2 source (crates/mx-agent-policy/src/file.rs): an
# [execution] block plus per-room, per-SENDER [rooms.*.agents.*] blocks. Every
# struct is #[serde(deny_unknown_fields)], so ANY stray key makes the whole policy
# malformed → silent deny-all. As of v0.2.2 (kortiene/mx-agent#366) authorization
# resolves `room.agents.get(<sender Matrix user id>)` — `policy_identity` keys the
# rule on the requester's `matrix_user_id` (the `@user:server` namespace the parser
# already required), NOT the wire `requesting_agent` derived agent id — and
# exact-matches the requested tool against `allow_tools`. The daemon reads
# policy.toml from MX_AGENT_CONFIG_DIR (resolved at the FIRST `daemon start`) —
# bootstrap-daemon-b.sh substitutes the @@…@@ coordinates and writes it there
# *before* starting daemon B.
#
# APPROVAL CAVEAT (see issue #73): v0.2.1 `requires_approval` is PER-AGENT (a single
# bool on the agent rule), NOT per-tool. The golden scenario assumes per-tool
# approval (the allow-tool ungated, the approval-tool held). That cannot be
# expressed in this schema. This fixture keeps the allowed/denied branches correct
# (requires_approval=false; the deny tool is absent → policy_denied) and lists the
# approval tool as allowed-ungated. Driving the awaiting_approval branch needs a
# per-tool approval capability in mx-agent OR a golden-scenario rework — a design
# decision tracked on #73.
#
# SECRET-FREE BY CONSTRUCTION — committed to git. Carries NO Matrix tokens, NO
# Ed25519 keys, NO provider keys, NO GH_TOKEN, and NO real room/agent ids. Every
# environment-specific value is a `@@…@@` placeholder substituted at bring-up from
# throwaway synthetic values. `network = "deny"` further bounds any run.

[execution]
network = "deny"                         # no egress for any tool/command run (design §6 L4)
default_sandbox = "@@SANDBOX_BACKEND@@"  # tight backend, e.g. bubblewrap|docker|podman
require_sandbox = true                   # never run a guarded command unsandboxed

[rooms."@@ROOM@@"]
trusted = true                           # the workspace room is an authorized boundary

# What daemon A (the delegator/sender) may ask daemon B to run. Keyed on A's Matrix
# user id (v0.2.2 / #366); trust is still scoped to A's agent id (`sender_agent`).
[rooms."@@ROOM@@".agents."@@SENDER_USER@@"]
allow_tools = ["@@ALLOW_TOOL@@", "@@APPROVAL_TOOL@@"]  # named tools (mx_delegate_tool / call.start)
allow_exec = true                        # permit the guarded-exec path for this agent
allow_commands = ["@@ALLOW_COMMAND@@"]   # the one allowlisted binary (e.g. echo)
allow_cwd = ["@@ALLOW_CWD@@"]            # cwd the command may run in
# Block the design's named dangerous patterns (per-entry regexes; TOML literal
# strings so `\s`/`\b` are not processed as TOML escapes).
deny_args_regex = ['\|\s*(?:sh|bash)\b', '\brm\s+-rf\s+/', '\bssh\b', '\bcurl\b']
requires_approval = false                # PER-AGENT — see APPROVAL CAVEAT above
sandbox = "@@SANDBOX_BACKEND@@"          # this agent's guarded-exec sandbox backend
